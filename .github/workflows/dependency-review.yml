---
name: Dependency Review

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@a90bcbc6539c36a85cdfeb73f7e2f433735f215b
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Dependency Review
        uses: actions/dependency-review-action@05fe4576374b728f0c523d6a13d64c25081e0803
        with:
          comment-summary-in-pr: on-failure
          fail-on-severity: moderate
          # Copyleft licenses (including LGPL) are denied by repo policy.
          deny-licenses: >-
            GPL-1.0-only, GPL-1.0-or-later, GPL-2.0-only,
            GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later,
            AGPL-3.0-only, AGPL-3.0-or-later, LGPL-2.1-only,
            LGPL-2.1-or-later, LGPL-3.0-only, LGPL-3.0-or-later
